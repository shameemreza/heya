name: Bug report
description: Something in Heya does not work the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this. The more concrete the steps, the faster it gets fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
      placeholder: I ran `heya ...` and instead of X, it did Y.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands or inputs, in order.
      placeholder: |
        1. heya init
        2. chose Local
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Heya version
      description: Run `heya --version`.
    validations:
      required: true
  - type: dropdown
    id: model
    attributes:
      label: Model setup
      options:
        - Local (Ollama)
        - Cloud (API key)
        - Not sure
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS and Python version
      placeholder: macOS 15, Python 3.12
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output or error
      description: Paste the relevant output. Remove any API keys or secrets first.
      render: shell

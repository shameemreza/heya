name: Feature request
description: Suggest something Heya should do.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Heya makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you have in mind
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
    validations:
      required: false
